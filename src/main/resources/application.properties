spring.application.name=dormshare

# ===== DATABASE CONFIGURATION (Supabase PostgreSQL) =====
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?sslmode=require
spring.datasource.username=postgres.geiegjgcelzmplldhgjh
spring.datasource.password=dormshare2026
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Supabase "shared pooler" uses pgBouncer (transaction mode). Disable server-side prepared statements.
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# HIBERNATE SETTINGS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT CONFIGURATION
jwt.secret=DormShareSecretKeyForJWTAuthenticationMustBe256BitsLong!!
jwt.expiration=86400000

# GOOGLE OAUTH2 CONFIGURATION
# Get credentials from: https://console.cloud.google.com/apis/credentials
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# SMTP EMAIL (optional)
# Set these via environment variables when you want email receipts to send.
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.from=${SMTP_FROM:}

# STRIPE CONFIGURATION (Sandbox)
# Get test keys from: https://dashboard.stripe.com/test/apikeys
# For sandbox testing, use test keys (starting with pk_test_ and sk_test_)
# Stripe API keys are sensitive. Use environment variables in CI/deploy or
# set them locally in a separate, untracked file.
# stripe.api.key=sk_test_... (DO NOT COMMIT SECRETS)
stripe.api.key=${STRIPE_API_KEY:}
stripe.public.key=${STRIPE_PUBLIC_KEY:}
stripe.sandbox.mode=true
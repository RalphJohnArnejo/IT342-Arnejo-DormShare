spring.application.name=dormshare

# ===== DATABASE CONFIGURATION =====
# Option A: H2 In-Memory Database (for local testing when Supabase is unreachable)
spring.datasource.url=jdbc:h2:mem:dormshare
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Option B: Supabase PostgreSQL (uncomment below and comment out H2 above when on a network that can reach Supabase)
# spring.datasource.url=jdbc:postgresql://db.geiegjgcelzmplldhgjh.supabase.co:5432/postgres
# spring.datasource.username=postgres
# spring.datasource.password=dormshare2026
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HIBERNATE SETTINGS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT CONFIGURATION
jwt.secret=DormShareSecretKeyForJWTAuthenticationMustBe256BitsLong!!
jwt.expiration=86400000


spring.application.name=dormshare

# Load .env file (if present) so environment-specific values are available
spring.config.import=optional:file:.env[.properties]

# ===== FRONTEND CONFIGURATION =====
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ===== DATABASE CONFIGURATION (Supabase PostgreSQL - Direct Connection) =====
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://db.geiegjgcelzmplldhgjh.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:dormshare2026}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Supabase "shared pooler" uses pgBouncer (transaction mode). Disable server-side prepared statements.
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# HIBERNATE SETTINGS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT CONFIGURATION
jwt.secret=DormShareSecretKeyForJWTAuthenticationMustBe256BitsLong!!
jwt.expiration=86400000

# GOOGLE OAUTH2 CONFIGURATION
# Get credentials from: https://console.cloud.google.com/apis/credentials
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.provider.google.user-name-attribute=email

# SMTP EMAIL CONFIGURATION
# Set these via environment variables when you want email receipts to send.
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.from=${SMTP_FROM:}

# EMAIL NOTIFICATION CONFIGURATION
# Enable/disable email notifications globally
app.email-notifications.enabled=true
# Enable/disable specific notification types
app.email-notifications.expense-created=true
app.email-notifications.group-invitation=true
app.email-notifications.settlement-reminder=true
app.email-notifications.group-member-added=true
app.email-notifications.payment-received=true

# STRIPE CONFIGURATION (Sandbox)
# Get test keys from: https://dashboard.stripe.com/test/apikeys
# For sandbox testing, use test keys (starting with pk_test_ and sk_test_)
# Set STRIPE_API_KEY and STRIPE_PUBLIC_KEY environment variables
stripe.api.key=${STRIPE_API_KEY:}
stripe.public.key=${STRIPE_PUBLIC_KEY:}
stripe.sandbox.mode=true
stripe.mock.enabled=false
spring.application.name=dormshare
# 1. THE JDBC URL (Must start with jdbc:postgresql://)
spring.datasource.url=jdbc:postgresql://db.geiegjgcelzmplldhgjh.supabase.co:5432/postgres

# 2. THE USERNAME (Standard for Supabase is postgres)
spring.datasource.username=postgres

# 3. THE PASSWORD (The one you created when setting up the project)
spring.datasource.password=dormshare2026

# 4. HIBERNATE SETTINGS (To automatically create your tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 5. JWT CONFIGURATION
jwt.secret=DormShareSecretKeyForJWTAuthenticationMustBe256BitsLong!!
jwt.expiration=86400000

# 6. GOOGLE OAUTH2 CONFIGURATION
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google